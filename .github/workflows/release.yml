name: Build Windows ARM64

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode (skip release upload)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  FLUTTER_VERSION_WIN_ARM64: "7e1c8868"
  FLUTTER_CHANNEL_WIN_ARM64: "main"
  RUST_VERSION: "1.84.1"
  LLVM_MINGW_VERSION: "20251202"

permissions:
  contents: write

jobs:
  # ============================================
  # Job 1: 获取版本号
  # ============================================
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | head -1 | sed 's/version: //' | sed 's/+.*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  # ============================================
  # Job 2: 在 Windows ARM64 runner 上编译
  # ============================================
  build_windows_arm64:
    needs: get_version
    runs-on: windows-11-arm

    steps:
      # ------------------------------------------
      # 1. 基础准备
      # ------------------------------------------
      - name: Enable long file paths
        run: |
          git config --system core.longpaths true
          git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------
      # 2. 安装 LLVM MinGW 工具链 (ARM64 原生)
      # ------------------------------------------
      - name: Install llvm-mingw-ucrt-aarch64
        run: |
          $ver = "${{ env.LLVM_MINGW_VERSION }}"
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$ver/llvm-mingw-$ver-ucrt-aarch64.zip"
          $zip = "$env:RUNNER_TEMP\llvm.zip"
          $extract = "$env:RUNNER_TEMP\extract"
          $target = "C:\clangarm64"

          Write-Host "Downloading LLVM MinGW from: $url"
          curl -L $url -o $zip

          Remove-Item -Recurse -Force $extract, $target -ErrorAction Ignore
          New-Item -ItemType Directory -Path $extract | Out-Null

          Write-Host "Extracting LLVM MinGW..."
          tar -xf $zip -C $extract
          Move-Item (Get-ChildItem $extract)[0].FullName $target

          $bin = "$target\bin"
          "$bin" >> $env:GITHUB_PATH
          "CLANGARM64_ROOT=$target" >> $env:GITHUB_ENV
          "CLANGARM64_BIN=$bin" >> $env:GITHUB_ENV

          Write-Host "LLVM MinGW installed to: $target"

      # ------------------------------------------
      # 3. 安装 Flutter (main 分支)
      # ------------------------------------------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL_WIN_ARM64 }}
          flutter-version: ${{ env.FLUTTER_VERSION_WIN_ARM64 }}

      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v
          dart --version

      # ------------------------------------------
      # 4. 安装 Rust
      # ------------------------------------------
      - name: Install Rust
        run: |
          rustup install ${{ env.RUST_VERSION }}
          rustup default ${{ env.RUST_VERSION }}
          rustup target add aarch64-pc-windows-msvc

      - name: Verify Rust installation
        working-directory: app
        run: |
          rustup show
          rustc --version
          cargo --version

      # ------------------------------------------
      # 5. 修复依赖冲突 + 获取依赖
      # ------------------------------------------
      - name: Fix dependency conflicts for Flutter main branch
        working-directory: app
        shell: pwsh
        run: |
          $content = Get-Content -Path "pubspec.yaml" -Raw

          # 如果已经有 dependency_overrides，先跳过
          if ($content -match "dependency_overrides:") {
            Write-Host "dependency_overrides already exists, skipping..."
            return
          }

          # 追加 dependency_overrides 来解决 SDK pin 冲突
          $overrides = @"

          dependency_overrides:
            matcher: any
            test_api: any
          "@

          Add-Content -Path "pubspec.yaml" -Value $overrides
          Write-Host "Added dependency_overrides to pubspec.yaml"
          Write-Host ""
          Write-Host "Last 10 lines of pubspec.yaml:"
          Get-Content "pubspec.yaml" | Select-Object -Last 10

      - name: Get Flutter dependencies
        working-directory: app
        run: flutter pub get

      # ------------------------------------------
      # 6. 生成代码
      # ------------------------------------------
      - name: Generate code
        working-directory: app
        run: |
          dart run build_runner build --delete-conflicting-outputs

      # ------------------------------------------
      # 7. 编译 Windows ARM64
      # ------------------------------------------
      - name: Build Windows ARM64
        working-directory: app
        run: |
          Write-Host "Building LocalSend for Windows ARM64..."
          flutter build windows --release
          Write-Host "Build completed!"

      # ------------------------------------------
      # 8. 查找构建产物目录
      # ------------------------------------------
      - name: Find build output
        working-directory: app
        run: |
          $possiblePaths = @(
            "build\windows\arm64\runner\Release",
            "build\windows\arm64\release\runner\Release",
            "build\windows\runner\Release",
            "build\windows\arm64\Release"
          )

          $release = $null
          foreach ($path in $possiblePaths) {
            if (Test-Path $path) {
              $release = $path
              Write-Host "Found build output at: $release"
              break
            }
          }

          if (-not $release) {
            Write-Host "Build output not found in expected paths. Searching..."
            Write-Host ""
            Write-Host "Directory tree under build\windows:"
            Get-ChildItem -Path "build\windows" -Recurse -Directory | ForEach-Object { Write-Host $_.FullName }

            $exeFile = Get-ChildItem -Path "build\windows" -Recurse -Filter "localsend*.exe" | Select-Object -First 1
            if (-not $exeFile) {
              $exeFile = Get-ChildItem -Path "build\windows" -Recurse -Filter "*.exe" | Select-Object -First 1
            }

            if ($exeFile) {
              $release = $exeFile.DirectoryName
              Write-Host "Found exe at: $release"
            } else {
              Write-Host "ERROR: No build output found!"
              exit 1
            }
          }

          "BUILD_RELEASE_PATH=$release" >> $env:GITHUB_ENV

          Write-Host ""
          Write-Host "Build output contents:"
          Get-ChildItem $release | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length/1KB, 1)) KB)"
          }

      # ------------------------------------------
      # 9. 后处理：添加运行时文件
      # ------------------------------------------
      - name: Post-build processing
        working-directory: app
        run: |
          $release = $env:BUILD_RELEASE_PATH

          Write-Host "Processing build output at: $release"

          # 创建 settings.json（便携模式）
          echo {} > "$release\settings.json"
          Write-Host "Created settings.json"

          # 复制 VC Runtime DLLs
          $system = "C:\Windows\System32"
          $dlls = @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")

          foreach ($dll in $dlls) {
            $src = "$system\$dll"
            if (Test-Path $src) {
              Copy-Item $src "$release\"
              Write-Host "Copied: $dll"
            } else {
              Write-Host "Warning: $dll not found in System32"
            }
          }

          # 检查是否需要 LLVM MinGW 运行时 DLL
          if ($env:CLANGARM64_ROOT) {
            $mingwBin = "$env:CLANGARM64_ROOT\aarch64-w64-mingw32\bin"
            $mingwDlls = @("libwinpthread-1.dll", "libc++.dll", "libunwind.dll")

            foreach ($dll in $mingwDlls) {
              $src = "$mingwBin\$dll"
              if (Test-Path $src) {
                Copy-Item $src "$release\"
                Write-Host "Copied MinGW DLL: $dll"
              }
            }
          }

          Write-Host ""
          Write-Host "Final release contents:"
          Get-ChildItem $release | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length/1KB, 1)) KB)"
          }

      # ------------------------------------------
      # 10. 打包为 ZIP
      # ------------------------------------------
      - name: Create ZIP archive
        working-directory: app
        env:
          VERSION: ${{ needs.get_version.outputs.version }}
        run: |
          $release = $env:BUILD_RELEASE_PATH
          $zipName = "LocalSend-${env:VERSION}-windows-arm64.zip"

          Compress-Archive -Path "$release\*" -DestinationPath $zipName

          Write-Host "Created: $zipName"
          Write-Host "Size: $([math]::Round((Get-Item $zipName).Length/1MB, 2)) MB"

      # ------------------------------------------
      # 11. 上传构建产物 (Artifact)
      # ------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalSend-${{ needs.get_version.outputs.version }}-windows-arm64
          path: app/LocalSend-${{ needs.get_version.outputs.version }}-windows-arm64.zip
          retention-days: 30

      # ------------------------------------------
      # 12. (可选) 上传到 Release
      # ------------------------------------------
      - name: Upload to Release
        if: inputs.test_mode == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get_version.outputs.version }}
          draft: true
          files: app/LocalSend-${{ needs.get_version.outputs.version }}-windows-arm64.zip
          fail_on_unmatched_files: true

  # ============================================
  # Job 3: 构建摘要
  # ============================================
  summary:
    needs: [get_version, build_windows_arm64]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## Windows ARM64 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ needs.get_version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Flutter** | main @ 7e1c8868 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Rust** | 1.84.1 |" >> $GITHUB_STEP_SUMMARY
          echo "| **LLVM MinGW** | 20251202 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | windows-11-arm |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Status** | ${{ needs.build_windows_arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Test Mode** | ${{ inputs.test_mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build_windows_arm64.result }}" = "success" ]; then
            echo "### ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Troubleshooting tips:**" >> $GITHUB_STEP_SUMMARY
            echo "- Check dependency conflicts with Flutter main branch" >> $GITHUB_STEP_SUMMARY
            echo "- Verify Rust FFI compilation on ARM64" >> $GITHUB_STEP_SUMMARY
            echo "- Check build output path in the logs" >> $GITHUB_STEP_SUMMARY
          fi
